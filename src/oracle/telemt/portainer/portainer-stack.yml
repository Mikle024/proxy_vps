services:
  agent:
    image: portainer/agent:2.39.3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - telemt-shared-net
    deploy:
      mode: global
      placement:
        constraints: [node.role == manager]

  portainer:
    image: portainer/portainer-ce:2.39.3
    command: -H tcp://tasks.agent:9001 --tlsskipverify
    ports:
      - "9443:9443"
    volumes:
      - portainer_data:/data
    networks:
      - telemt-shared-net
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]

networks:
  telemt-shared-net:
    external: true

volumes:
  portainer_data:
